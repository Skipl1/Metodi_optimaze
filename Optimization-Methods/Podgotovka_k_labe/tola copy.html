    <script type="text/javascript">
        // Функция для создания 3D графика
        function generateOptimizationPlot(q1_all_drow,q2_all_drow,q3_all_drow,I_all_drow) {

            // Генерация меток для точек траектории (M0, M1, ..., I*)
            const labels = q1_all_drow.map((_, i) => i === q1_all_drow.length - 1 ? 'I*' : `M${i}`);
        
            // Последняя точка (стартовая для эллипсоида)
            const q1Star = q1_all_drow[q1_all_drow.length - 1];
            const q2Star = q2_all_drow[q2_all_drow.length - 1];
            const q3Star = q3_all_drow[q3_all_drow.length - 1];
        
            // Вычисление расстояние до первой точки = значение I
            // Функция для вычисления расстояния между двумя точками в 3D пространстве
            function squaredDistance(x1, y1, z1, x2, y2, z2) {
            return (x1 - x2) ** 2 + (y1 - y2) ** 2 + (z1 - z2) ** 2;
            }
        
            // Расстояние от первой точки до стартовой (для вычисления I)
            const I0 = squaredDistance(q1_all_drow[0], q2_all_drow[0], q3_all_drow[0], q1Star, q2Star, q3Star); // I для M0
            const C1 = I0;              // Самый большой эллипсоид (входит M0)
            const C2 = I0 * 0.5;
            const C3 = I0 * 0.2;
        

            // Создаём массив customdata: [ [q1, q2, q3, I], ... ]
        const custom = q1_all_drow.map((q1, i) => [
            q1,
            q2_all_drow[i],
            q3_all_drow[i],
            I_all_drow[i]
        ]);
            // Траектория
            // Траектория, представленная в виде 3D графика с точками и линиями
            const tracePath = {
            x: q1_all_drow,
            y: q2_all_drow,
            z: q3_all_drow,
            mode: 'lines+markers+text',
            type: 'scatter3d',
            marker: { size: 5, color: 'black' },
            line: { color: 'black', width: 2 },
            text: labels,
            textposition: 'top center',
            name: 'Optimization Path',

            customdata: custom,
            hovertemplate:
                'q₁: %{customdata[0]:.3f}<br>' +
                'q₂: %{customdata[1]:.3f}<br>' +
                'q₃: %{customdata[2]:.3f}<br>' +
                'I: %{customdata[3]:.8f}<br>' +
                '<extra>%{text}</extra>'
            };
        
            // Генератор изосферы I = C
            // Функция для генерации изосферы (поверхности, соответствующей уровню I = C)
            function generateIsosurface(level, label, color, opacity, labelOffset = 1.1) {
            const radius = Math.sqrt(level);
            const resolution = 30;
            const phi = [], theta = [];
        
            for (let i = 0; i < resolution; i++) {
                phi.push((i / (resolution - 1)) * Math.PI);
                theta.push((i / (resolution - 1)) * 2 * Math.PI);
            }
        
            const x = [], y = [], z = [];
            // Генерация координат для 3D поверхности
            for (let i = 0; i < phi.length; i++) {
                x[i] = [], y[i] = [], z[i] = [];
                for (let j = 0; j < theta.length; j++) {
                    // Расчет координат каждой точки на сфере
                x[i].push(radius * Math.sin(phi[i]) * Math.cos(theta[j]) + q1Star);
                y[i].push(radius * Math.sin(phi[i]) * Math.sin(theta[j]) + q2Star);
                z[i].push(radius * Math.cos(phi[i]) + q3Star);
                }
            }
        
            // Поверхность
            // Поверхность (изосфера), заданная цветом, прозрачностью и уровнем
            const surface = {
                type: 'surface',
                x: x, y: y, z: z,
                opacity: opacity,
                showscale: false,
                surfacecolor: Array(x.length).fill(Array(x[0].length).fill(level)),
                colorscale: [[0, color], [1, color]],
                name: label,
                hoverinfo: 'skip'
            };
        
            // Метка уровня (вынесена в отдельный trace)
            const labelTrace = {
                type: 'scatter3d',
                mode: 'text',
                x: [q1Star + labelOffset * radius],
                y: [q2Star],
                z: [q3Star],
                text: [label],
                textposition: 'top center',
                textfont: {
                size: 14,
                color: 'black'
                },
                hoverinfo: 'none',
                showlegend: false
            };
        
            return [surface, labelTrace];
            }
        
            const [ellipsoid1, label1] = generateIsosurface(C1, 'I = C₁', 'rgba(150,150,255,0.5)', 0.2, 1.2);
            const [ellipsoid2, label2] = generateIsosurface(C2, 'I = C₂', 'rgba(100,100,200,0.5)', 0.2, 1.05);
            const [ellipsoid3, label3] = generateIsosurface(C3, 'I = C₃', 'rgba(50,50,150,0.5)', 0.2, 1.0);
        
            const layout = {
            title: 'Графическое изображение движения алгоритма оптимизации (Метод наискорейшего спуска)',
            scene: {
                xaxis: { title: 'q₁' },
                yaxis: { title: 'q₂' },
                zaxis: { title: 'q₃' }
            }
            };
        
            Plotly.newPlot('plot3d',
            [ellipsoid1, label1, ellipsoid2, label2, ellipsoid3, label3, tracePath],
            layout
            );
        }
  
        // Функция для моделирования системы с заданными параметрами PID (для неоптимальных графиков)
        function simulateSystem(q1, q2, q3, T1 = 1, k11 = 1, T2 = 0.5, e = 0.75, g = 1, dt = 0.001, L = 15) {
            let y = 0;
            let t_ = 0;
            let z11 = 0, z21 = 0, z12 = 0;
            let x = 0;
            let sumx = 0;
            let xpr = 0;
            let times = [];
            let y_values = [];
            let y_et_values = [];
            
            while (t_ <= L) {
                xpr = x;
                x = g - y;
                
                let u = q1 * x;
                sumx = sumx + x * dt;
                let u_i = q2 * sumx;
                let dx = (x - xpr) / dt;
                let u_d = q3 * dx;
                u = u + u_i + u_d;
                
                // ОУ с ПИД
                let y1 = z11;
                let k1 = (z21 - 2 * e / T1 * y1) * dt;
                let m1 = (k11 / (T1 ** 2) * u - (1 / (T1 ** 2)) * y1) * dt;
                let k2 = ((z21 + m1 / 2) - (2 * e / T1) * (y1 + k1 / 2)) * dt;
                let m2 = (k11 / (T1 ** 2) * u - (1 / (T1 ** 2)) * (y1 + k1 / 2)) * dt;
                let k3 = ((z21 + m2 / 2) - (2 * e / T1) * (y1 + k2 / 2)) * dt;
                let m3 = (k11 / (T1 ** 2) * u - (1 / (T1 ** 2)) * (y1 + k2 / 2)) * dt;
                let k4 = ((z21 + m3) - (2 * e / T1) * (y1 + k3)) * dt;
                let m4 = (k11 / (T1 ** 2) * u - (1 / (T1 ** 2)) * (y1 + k3)) * dt;
                z11 = z11 + (k1 + 2 * k2 + 2 * k3 + k4) / 6;
                z21 = z21 + (m1 + 2 * m2 + 2 * m3 + m4) / 6;
                
                // ОУ ЭТ
                let y2 = z12;
                let k1_et = (1 / T2 * g - (1 / T2) * y2) * dt;
                let k2_et = (1 / T2 * g - (1 / T2) * (y2 + k1_et / 2)) * dt;
                let k3_et = (1 / T2 * g - (1 / T2) * (y2 + k2_et / 2)) * dt;
                let k4_et = (1 / T2 * g - (1 / T2) * (y2 + k3_et)) * dt;
                z12 = z12 + (k1_et + 2 * k2_et + 2 * k3_et + k4_et) / 6;
                
                y = z11;
                
                times.push(t_);
                y_values.push(y);
                y_et_values.push(z12);
                
                t_ = t_ + dt;
            }
            return { times, y_pid: y_values, y_et: y_et_values };
        }

        google.charts.load('current', { 'packages': ['corechart'] });
        google.charts.setOnLoadCallback(drawChart);
        function drawChart() {
            var T1 = 1, k11 = 1; T2 = 0.5
            var e = 0.75;
            var g = 1;
            var dt = 0.001;//T1/100;
            var L = 15;
            var y, y_un, t_, u, q1, q2, q3, sumx, u_i, u_d, xpr, dx;
            var y1_1, z11_1, z21_1;
            var i, j, ns, tau;
            var krit;
            var ksi1, sum_ksi1, d_ksi1, du_dq1, pr_ksi1;
            var ksi2, sum_ksi2, d_ksi2, du_dq2, pr_ksi2;
            var ksi3, sum_ksi3, d_ksi3, du_dq3, pr_ksi3;
            var z11, z21, z12;
            tau = 0.1;
            ns = tau / dt;

            // Переменные для метода наискорейшего спуска
            var current_direction_q1 = 0, current_direction_q2 = 0, current_direction_q3 = 0;
            var direction_min_krit = 0, direction_best_q1 = 0, direction_best_q2 = 0, direction_best_q3 = 0;
            var steps_in_direction = 0, continue_in_direction = false;
            var prev_q1 = 0, prev_q2 = 0, prev_q3 = 0;

            q_arr = [[9, 0.5, 3], [5, 1, 4], [1, 7, 1]];


            var arr_I = new Array(['t', 'I_1', 'I_2', 'I_3']);
            var arr_q_all = new Array(['t', '1exp', '2exp', '3exp']);
            var arr_ksi_all = new Array(['t', '1exp', '2exp', '3exp']);
            var arr_q1 = new Array(['t', 'q11', 'q12', 'q13']);
            var arr_q2 = new Array(['t', 'q21', 'q22', 'q23']);
            var arr_q3 = new Array(['t', 'q31', 'q32', 'q33']);
             q1_all_drow = [];
             q2_all_drow = [];
             q3_all_drow = [];
             I_all_drow = [];
            max_I_ksi  = -10;
            
            // Сохраняем данные для неоптимальных графиков переходных процессов
            var nonoptimalData = [];
            
            for (let q_arr_i = 0; q_arr_i < q_arr.length; q_arr_i++) {
                q_arr_part = q_arr[q_arr_i]
                q1 = q_arr_part[0]; q2 = q_arr_part[1]; q3 = q_arr_part[2];
                i_I = q_arr_i + 1;
                arr_I1_index = 0;
                arr_I2_index = 0;
                arr_I3_index = 0;
                q1_all_drow = [];
                q2_all_drow = [];
                q3_all_drow = [];
                I_all_drow = [];
                var arr_ksi_optimal = new Array(['t', 'ksi1', 'ksi2', 'ksi3']);
                var arr_ksi_unoptimal = new Array(['t', 'ksi1_unoptimal', 'ksi2_unoptimal', 'ksi3_unoptimal']);
                var arr_dI_dq = new Array(['t', 'dI_dq1', 'dI_dq2', 'dI_dq3']);
                
                var arr_dI2_dq = new Array([]);
                var arr_dI3_dq = new Array([]);
                var arr_model_optimum = new Array(['t', 'h(t)', 'g(t)', 'эталонная модель']);
                var arr_model_unoptimum = new Array(['t', 'h(t)', 'g(t)',]);
                var arr_q = new Array(['t', 'q1', 'q2', 'q3']);

                var mas = new Array(['y']);
                var mas_un = new Array(['y']);
                var mas_ksi1 = new Array(['ksi1']);
                var mas_ksi2 = new Array(['ksi2']);
                var mas_ksi3 = new Array(['ksi3']);
                var mas_ksi1_un = new Array(['ksi1_unoptimal']);
                var mas_ksi2_un = new Array(['ksi2_unoptimal']);
                var mas_ksi3_un = new Array(['ksi3_unoptimal']);
                var Iter = 0; //кол-во итераций оптимизации
                var dI_dq1, dI_dq2, dI_dq3; //сост градиента
                var sumI = 1;
                var h = 0.3;
                var pr_krit = 0;
                krit = 0;

                var dI_dq1_prev, dI_dq2_prev, dI_dq3_prev = 0;

                gradSum = 0;
                
                // Сбрасываем переменные направления для каждого эксперимента
                current_direction_q1 = 0; current_direction_q2 = 0; current_direction_q3 = 0;
                direction_min_krit = 0; direction_best_q1 = 0; direction_best_q2 = 0; direction_best_q3 = 0;
                steps_in_direction = 0; continue_in_direction = false;

                // Сохраняем начальные параметры для графика неоптимальных переходных процессов
                var simResult = simulateSystem(q1, q2, q3, T1, k11, T2, e, g, dt, L);
                nonoptimalData.push({
                    q1: q1, q2: q2, q3: q3,
                    times: simResult.times,
                    y_pid: simResult.y_pid,
                    label: `Набор ${q_arr_i+1}: q1=${q1}, q2=${q2}, q3=${q3}`
                });

                while (Iter < 150 && sumI > 0.0001) {

                    Iter++;
                    i = 0;
                    j = 0;
                    t_ = 0;
                    x = 0, x_un = 0;
                    y = 0; y1 = 0; y2 = 0; y3 = 0; y_un1 = 0;
                    y_un = 0;
                    dI_dq1 = 0, dI_dq2 = 0, dI_dq3 = 0;
                    sumx = 0; sumx_un = 0;

                    pr_krit = krit;//сохраняем предыдущий
                    console.log(krit);
                    krit = 0;

                    z11 = 0, z21 = 0, z12 = 0;
                    z11_un = 0, z21_un = 0;

                    y1_1 = 0, z11_1 = 0, z21_1 = 0;
                    ksi1 = 0; sum_ksi1 = 0; pr_ksi1 = 0;

                    y1_1_un = 0, z11_1_un = 0, z21_1_un = 0;
                    ksi1_un = 0; sum_ksi1_un = 0; pr_ksi1_un = 0;

                    y1_2 = 0, z11_2 = 0, z21_2 = 0;
                    ksi2 = 0; sum_ksi2 = 0; pr_ksi2 = 0;

                    y1_2_un = 0, z11_2_un = 0, z21_2_un = 0;
                    ksi2_un = 0; sum_ksi2_un = 0; pr_ksi2_un = 0;

                    y1_3 = 0, z11_3 = 0, z21_3 = 0;
                    ksi3 = 0; sum_ksi3 = 0; pr_ksi3 = 0;

                    y1_3_un = 0, z11_3_un = 0, z21_3_un = 0;
                    ksi3_un = 0; sum_ksi3_un = 0; pr_ksi3_un = 0;

                    while (t_ <= L) {
                        xpr = x;
                        x = g - y;

                        xpr_un = x_un;
                        x_un = g - y_un;

                        y1 = z11;//ОУ
                        y2 = z12; //ОУ ЭТ

                        krit = krit + Math.abs(y2 - y1) * dt;

                        u = q1 * x; //пропорционально - повышает быстродействие, снижает ошибку; жестка управляет, колебательную

                        //интегральная состовляющая уменьшает ошибку, задача получить ошибку равную нулю; делает астатизм; используют для устранения статической ошибки. Она позволяет регулятору со временем учесть статическую ошибку.
                        sumx = sumx + x * dt; //интегрируем ошибку
                        u_i = q2 * sumx; //интегральная состовляющая
                        dx = (x - xpr) / dt; //дифференцирование //дифференцирование позволяет прогназировать сигнал ее работу, делает более гладка; предназначена для противодействия отклонениям от целевого значения,
                        //которые прогнозируются в будущем.
                        u_d = q3 * dx;
                        u = u + u_i + u_d;

                        sumx_un = sumx_un + x_un * dt;
                        dx_un = (x_un - xpr_un) / dt;

                        if (continue_in_direction === false) {

                            //du_dq1
                            sum_ksi1 += ksi1 * dt;
                            d_ksi1 = (ksi1 - pr_ksi1) / dt;
                            du_dq1 = x - q1 * ksi1 - q2 * sum_ksi1 - q3 * d_ksi1;

                            sum_ksi1_un += ksi1_un * dt;
                            d_ksi1_un = (ksi1_un - pr_ksi1_un) / dt;
                            du_dq1_un = x_un;// - 3 * ksi1_un - 4 * sum_ksi1_un - 7 * d_ksi1_un;

                            //du_dq2
                            sum_ksi2 += ksi2 * dt;
                            d_ksi2 = (ksi2 - pr_ksi2) / dt;
                            du_dq2 = sumx - q1 * ksi2 - q2 * sum_ksi2 - q3 * d_ksi2;

                            sum_ksi2_un += ksi2_un * dt;
                            d_ksi2_un = (ksi2_un - pr_ksi2_un) / dt;
                            du_dq2_un = sumx_un;// - 3 * ksi2_un - 4 * sum_ksi2_un - 7 * d_ksi2_un;

                            //du_dq3
                            sum_ksi3 += ksi3 * dt;
                            d_ksi3 = (ksi3 - pr_ksi3) / dt;
                            du_dq3 = dx - q1 * ksi3 - q2 * sum_ksi3 - q3 * d_ksi3;

                            sum_ksi3_un += ksi3_un * dt;
                            d_ksi3_un = (ksi3_un - pr_ksi3_un) / dt;
                            du_dq3_un = dx_un;//- 3 * ksi3_un - 4 * sum_ksi3_un - 7 * d_ksi3_un;

                        }

                        //ОУ с ПИД
                        k1 = (z21 - 2 * e / T1 * y1) * dt;
                        m1 = (k11 / (T1 ** 2) * u - (1 / (T1 ** 2)) * y1) * dt;
                        k2 = ((z21 + m1 / 2) - (2 * e / T1) * (y1 + k1 / 2)) * dt;
                        m2 = (k11 / (T1 ** 2) * u - (1 / (T1 ** 2)) * (y1 + k1 / 2)) * dt;
                        k3 = ((z21 + m2 / 2) - (2 * e / T1) * (y1 + k2 / 2)) * dt;
                        m3 = (k11 / (T1 ** 2) * u - (1 / (T1 ** 2)) * (y1 + k2 / 2)) * dt;
                        k4 = ((z21 + m3) - (2 * e / T1) * (y1 + k3)) * dt;
                        m4 = (k11 / (T1 ** 2) * u - (1 / (T1 ** 2)) * (y1 + k3)) * dt;
                        z11 = z11 + (k1 + 2 * k2 + 2 * k3 + k4) / 6;
                        z21 = z21 + (m1 + 2 * m2 + 2 * m3 + m4) / 6;

                        //ОУ без ПИД
                        y_un1 = z11_un;
                        k1 = (z21_un - 2 * e / T1 * y_un1) * dt;
                        m1 = (k11 / (T1 ** 2) * x_un - (1 / (T1 ** 2)) * y_un1) * dt;
                        k2 = ((z21_un + m1 / 2) - (2 * e / T1) * (y_un1 + k1 / 2)) * dt;
                        m2 = (k11 / (T1 ** 2) * x_un - (1 / (T1 ** 2)) * (y_un1 + k1 / 2)) * dt;
                        k3 = ((z21_un + m2 / 2) - (2 * e / T1) * (y_un1 + k2 / 2)) * dt;
                        m3 = (k11 / (T1 ** 2) * x_un - (1 / (T1 ** 2)) * (y_un1 + k2 / 2)) * dt;
                        k4 = ((z21_un + m3) - (2 * e / T1) * (y_un1 + k3)) * dt;
                        m4 = (k11 / (T1 ** 2) * x_un - (1 / (T1 ** 2)) * (y_un1 + k3)) * dt;
                        z11_un = z11_un + (k1 + 2 * k2 + 2 * k3 + k4) / 6;
                        z21_un = z21_un + (m1 + 2 * m2 + 2 * m3 + m4) / 6;

                        //ОУ ЭТ

                        k1 = (1 / T2 * g - (1 / T2) * y2) * dt;
                        k2 = (1 / T2 * g - (1 / T2) * (y2 + k1 / 2)) * dt;
                        k3 = (1 / T2 * g - (1 / T2) * (y2 + k2 / 2)) * dt;
                        k4 = (1 / T2 * g - (1 / T2) * (y2 + k3)) * dt;
                        z12 = z12 + (k1 + 2 * k2 + 2 * k3 + k4) / 6;

                        if (continue_in_direction === false) {
                            //ksi1

                            y1_1 = z11_1;
                            k1 = (z21_1 - 2 * e / T1 * y1_1) * dt;
                            m1 = (k11 / (T1 ** 2) * du_dq1 - (1 / (T1 ** 2)) * y1_1) * dt;
                            k2 = ((z21_1 + m1 / 2) - (2 * e / T1) * (y1_1 + k1 / 2)) * dt;
                            m2 = (k11 / (T1 ** 2) * du_dq1 - (1 / (T1 ** 2)) * (y1_1 + k1 / 2)) * dt;
                            k3 = ((z21_1 + m2 / 2) - (2 * e / T1) * (y1_1 + k2 / 2)) * dt;
                            m3 = (k11 / (T1 ** 2) * du_dq1 - (1 / (T1 ** 2)) * (y1_1 + k2 / 2)) * dt;
                            k4 = ((z21_1 + m3) - (2 * e / T1) * (y1_1 + k3)) * dt;
                            m4 = (k11 / (T1 ** 2) * du_dq1 - (1 / (T1 ** 2)) * (y1_1 + k3)) * dt;
                            z11_1 = z11_1 + (k1 + 2 * k2 + 2 * k3 + k4) / 6;
                            z21_1 = z21_1 + (m1 + 2 * m2 + 2 * m3 + m4) / 6;

                            pr_ksi1 = ksi1;

                            y1_1_un = z11_1_un;
                            k1 = (z21_1_un - 2 * e / T1 * y1_1_un) * dt;
                            m1 = (k11 / (T1 ** 2) * du_dq1_un - (1 / (T1 ** 2)) * y1_1_un) * dt;
                            k2 = ((z21_1_un + m1 / 2) - (2 * e / T1) * (y1_1_un + k1 / 2)) * dt;
