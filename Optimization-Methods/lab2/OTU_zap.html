<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <script
      type="text/javascript"
      src="https://www.gstatic.com/charts/loader.js"
    ></script>

    <script type="text/javascript">
      google.charts.load("current", { packages: ["corechart"] });
      google.charts.setOnLoadCallback(drawChart);

      function drawChart() {
        var T = 1;
        var k = 1;
        var zeta = 0.75;
        var tau = 0.1;
        var g = 1;
        var dt = 0.01;
        var L = 7;
        var ns = Math.round(tau / dt); // сколько шагов ждать
        var mas = []; // массив для хранения значений
        var z1 = 0;
        var z2 = 0;
        var y_now = 0; // сигнал сейчас
        var y_delayed = 0; // задержанный сигнал
        var x;
        var k1, k2, k3, k4, m1, m2, m3, m4;
        var t_ = 0;
        var A = [
          [
            "t",
            "y(t) - без запаздывания",
            "y(t) - с запаздыванием",
            "g(t) - вход",
          ],
        ];

        while (t_ <= L) {
          y_now = z1;

          // Реализация запаздывания
          mas.push(y_now); // сохраняем текущее значение

          if (mas.length > ns) {
            y_delayed = mas.shift(); // берем старое значение
          } else {
            y_delayed = 0;
          }

          x = g - y_now;

          // Добавляем точку на график
          A.push([t_, y_now, y_delayed, g]);

          // Метод Рунге-Кутты
          k1 = dt * (z2 - ((2 * zeta) / T) * y_now);
          m1 = dt * ((k / (T * T)) * x - y_now / (T * T));

          k2 = dt * (z2 + m1 / 2 - ((2 * zeta) / T) * (y_now + k1 / 2));
          m2 = dt * ((k / (T * T)) * x - (1 / (T * T)) * (y_now + k1 / 2));

          k3 = dt * (z2 + m2 / 2 - ((2 * zeta) / T) * (y_now + k2 / 2));
          m3 = dt * ((k / (T * T)) * x - (1 / (T * T)) * (y_now + k2 / 2));

          k4 = dt * (z2 + m3 - ((2 * zeta) / T) * (y_now + k3));
          m4 = dt * ((k / (T * T)) * x - (1 / (T * T)) * (y_now + k3));

          z1 = z1 + (1 / 6) * (k1 + 2 * k2 + 2 * k3 + k4);
          z2 = z2 + (1 / 6) * (m1 + 2 * m2 + 2 * m3 + m4);

          t_ = t_ + dt;
        }

        var data = google.visualization.arrayToDataTable(A);
        var options = {
          curveType: "function",
          hAxis: { title: "Время t, с" },
          vAxis: { title: "Амплитуда" },
          legend: { position: "bottom" },
          colors: ["#2980b9", "#c0392b", "#f1c40f"],
          lineWidth: 2,
        };

        var chart = new google.visualization.LineChart(
          document.getElementById("curve_chart"),
        );
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <div class="conteiner" style="display: flex; justify-content: center">
      <div id="curve_chart" style="width: 900px; height: 600px"></div>
    </div>
  </body>
</html>
